    <title>QuoteReels | İlham Veren Sözler</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Inline Styles for Single File -->
    <style>
        /* ============================================
           CSS RESET & BASE STYLES
           ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        :root {
            /* Typography */
            --font-primary: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Playfair Display', Georgia, serif;
            
            /* Colors - Light Theme Base */
            --color-bg: #f8f9fa;
            --color-surface: #ffffff;
            --color-text: #212529;
            --color-text-secondary: #6c757d;
            --color-border: #dee2e6;
            --color-shadow: rgba(0, 0, 0, 0.1);
            
            /* Spacing */
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-xxl: 3rem;
            
            /* Border Radius */
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 9999px;
            
            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-base: 0.3s ease;
            --transition-slow: 0.5s ease;
            
            /* Z-index Scale */
            --z-base: 1;
            --z-dropdown: 100;
            --z-sticky: 200;
            --z-modal: 300;
            --z-tooltip: 400;
            --z-toast: 500;
        }

        /* ============================================
           LAYOUT & CONTAINER
           ============================================ */
        html {
            height: 100%;
            overflow: hidden;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-primary);
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            scroll-snap-stop: always;
            background: var(--color-bg);
            color: var(--color-text);
            touch-action: pan-y;
            position: relative;
        }

        /* Hide Scrollbar */
        body::-webkit-scrollbar {
            display: none;
        }
        
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ============================================
           REEL CARD STYLES
           ============================================ */
        .reel-card {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: background 1s cubic-bezier(0.4, 0, 0.2, 1);
            isolation: isolate;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* ============================================
           THEME DEFINITIONS - 8 BEAUTIFUL THEMES
           ============================================ */
        
        /* Theme 1: Golden Hour (Sahra) */
        .theme-golden {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 50%, #fab1a0 100%);
            --theme-primary: #fdcb6e;
            --theme-secondary: #fab1a0;
            --theme-symbol: "🌸";
        }

        /* Theme 2: Misty Cloud (Bulut) */
        .theme-cloud {
            background: linear-gradient(135deg, #dfe6e9 0%, #b2bec3 50%, #74b9ff 100%);
            --theme-primary: #b2bec3;
            --theme-secondary: #74b9ff;
            --theme-symbol: "☁️";
        }

        /* Theme 3: Lavender Dream (Lavanta) */
        .theme-lavender {
            background: linear-gradient(135deg, #a29bfe 0%, #dfe6e9 50%, #fd79a8 100%);
            --theme-primary: #a29bfe;
            --theme-secondary: #fd79a8;
            --theme-symbol: "✨";
        }

        /* Theme 4: Rose Garden (Pembe) */
        .theme-rose {
            background: linear-gradient(135deg, #fd79a8 0%, #fab1a0 50%, #ffeaa7 100%);
            --theme-primary: #fd79a8;
            --theme-secondary: #fab1a0;
            --theme-symbol: "🌺";
        }

        /* Theme 5: Mint Forest (Orman) */
        .theme-mint {
            background: linear-gradient(135deg, #55efc4 0%, #81ecec 50%, #74b9ff 100%);
            --theme-primary: #55efc4;
            --theme-secondary: #81ecec;
            --theme-symbol: "🌿";
        }

        /* Theme 6: Ocean Wave (Okyanus) */
        .theme-ocean {
            background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 50%, #dfe6e9 100%);
            --theme-primary: #74b9ff;
            --theme-secondary: #a29bfe;
            --theme-symbol: "🌊";
        }

        /* Theme 7: Sunset Glow (Gün Batımı) */
        .theme-sunset {
            background: linear-gradient(135deg, #ff7675 0%, #fdcb6e 50%, #ffeaa7 100%);
            --theme-primary: #ff7675;
            --theme-secondary: #fdcb6e;
            --theme-symbol: "🌅";
        }

        /* Theme 8: Midnight Star (Gece) */
        .theme-midnight {
            background: linear-gradient(135deg, #2d3436 0%, #636e72 50%, #b2bec3 100%);
            --theme-primary: #636e72;
            --theme-secondary: #b2bec3;
            --theme-symbol: "🌙";
        }

        /* ============================================
           ANIMATION KEYFRAMES - 20 PER THEME
           ============================================ */
        
        /* Animation 1: Float Up */
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* Animation 2: Float Down */
        @keyframes floatDown {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(100vh) rotate(-360deg); opacity: 0; }
        }

        /* Animation 3: Pulse Scale */
        @keyframes pulseScale {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.3); opacity: 0.6; }
        }

        /* Animation 4: Gentle Rotate */
        @keyframes gentleRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Animation 5: Drift Horizontal */
        @keyframes drift {
            0%, 100% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(20px) translateY(-10px); }
            50% { transform: translateX(-10px) translateY(10px); }
            75% { transform: translateX(15px) translateY(-5px); }
        }

        /* Animation 6: Twinkle */
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Animation 7: Wave Motion */
        @keyframes wave {
            0%, 100% { transform: translateX(0) scaleY(1); }
            50% { transform: translateX(-25%) scaleY(0.8); }
        }

        /* Animation 8: Breathe */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }

        /* Animation 9: Spiral */
        @keyframes spiral {
            0% { transform: rotate(0deg) translateX(50px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(50px) rotate(-360deg); }
        }

        /* Animation 10: Bounce Gentle */
        @keyframes bounceGentle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Animation 11: Fade In Out */
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; }
        }

        /* Animation 12: Shake */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Animation 13: Swing */
        @keyframes swing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* Animation 14: Slide Up Fade */
        @keyframes slideUpFade {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 0.6; }
        }

        /* Animation 15: Heartbeat */
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }

        /* Animation 16: Orbit */
        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(30px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(30px) rotate(-360deg); }
        }

        /* Animation 17: Rain Drop */
        @keyframes rain {
            0% { transform: translateY(-100px); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* Animation 18: Wind */
        @keyframes wind {
            0%, 100% { transform: translateX(-100%) skewX(-10deg); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateX(100vw) skewX(10deg); opacity: 0; }
        }

        /* Animation 19: Glow Pulse */
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.2); }
            50% { box-shadow: 0 0 40px rgba(255,255,255,0.6); }
        }

        /* Animation 20: Morph */
        @keyframes morph {
            0%, 100% { border-radius: 50%; }
            33% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            66% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; }
        }

        /* ============================================
           ANIMATION ELEMENTS - 20 PER THEME
           ============================================ */
        
        .anim-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        /* Floating Elements Base */
        .float-item {
            position: absolute;
            font-size: 2rem;
            opacity: 0;
            will-change: transform, opacity;
        }

        /* Particle Dots */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            will-change: transform, opacity;
        }

        /* Decorative Circles */
        .deco-circle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
            will-change: transform;
        }

        /* ============================================
           QUOTE BOX STYLES
           ============================================ */
        .quote-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 32px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.15), 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform: translateZ(0);
            will-change: transform;
            transition: transform 0.3s ease;
        }

        .quote-text {
            font-family: var(--font-display);
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            color: var(--color-text);
            line-height: 1.4;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .quote-author {
            font-size: 1.1rem;
            color: var(--color-text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
        }

        .quote-category {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 100px;
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        /* ============================================
           BOTTOM CONTROLS
           ============================================ */
        .controls {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            padding: 14px 28px;
            border-radius: 100px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .ctrl-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--color-text);
            position: relative;
            overflow: hidden;
        }

        .ctrl-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.2s ease;
        }

        .ctrl-btn:active::before {
            transform: scale(1);
        }

        .ctrl-btn:active {
            transform: scale(0.9);
        }

        .ctrl-btn.liked {
            color: #ff006e;
        }

        /* ============================================
           THEME SELECTOR SHEET
           ============================================ */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .theme-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 40px 40px 0 0;
            padding: 30px;
            z-index: 300;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 -10px 50px rgba(0, 0, 0, 0.3);
        }

        .theme-sheet.open {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 50px;
            height: 5px;
            background: #dee2e6;
            border-radius: 3px;
            margin: 0 auto 25px;
        }

        .sheet-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
            color: var(--color-text);
            font-family: var(--font-display);
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .theme-item {
            height: 140px;
            border-radius: 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 4px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .theme-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.3) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .theme-item:hover::before {
            opacity: 1;
        }

        .theme-item.selected {
            border-color: #2d3436;
            transform: scale(0.95);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .theme-icon {
            font-size: 3rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            z-index: 1;
        }

        .theme-name {
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            font-size: 1.1rem;
            z-index: 1;
            letter-spacing: 0.02em;
        }

        /* ============================================
           TOAST NOTIFICATION
           ============================================ */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(45, 52, 54, 0.95);
            color: white;
            padding: 16px 32px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1rem;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */
        @media (min-width: 768px) {
            .quote-container {
                padding: 50px 60px;
                max-width: 700px;
            }
            
            .quote-text {
                font-size: 2.4rem;
            }
            
            .theme-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .controls {
                gap: 20px;
                padding: 16px 32px;
            }
            
            .ctrl-btn {
                width: 56px;
                height: 56px;
                font-size: 26px;
            }
        }

        @media (max-width: 480px) {
            .quote-container {
                padding: 30px 20px;
            }
            
            .quote-text {
                font-size: 1.3rem;
            }
            
            .theme-item {
                height: 120px;
            }
            
            .theme-icon {
                font-size: 2.5rem;
            }
            
            .controls {
                padding: 12px 20px;
                gap: 12px;
            }
            
            .ctrl-btn {
                width: 44px;
                height: 44px;
                font-size: 20px;
            }
        }

        @media (max-height: 700px) {
            .quote-container {
                padding: 25px 20px;
            }
            
            .quote-text {
                font-size: 1.2rem;
                margin-bottom: 16px;
            }
        }

        /* ============================================
           ACCESSIBILITY & UTILITIES
           ============================================ */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Loading State */
        .loading {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

            { id: 45, text: "Dostluk, en güzel hediyedir hayatta.", author: "Woodrow Wilson", category: "Değer", theme: 4 },

            { id: 48, text: "Başarı, düşmekten korkmamaktır.", author: "Nelson Mandela", category: "Korkusuzluk", theme: 7 },
            { id: 49, text: "Hayat, ona değer verdiğinde değerlenir.", author: "Seneca", category: "Değer", theme: 0 },
            { id: 50, text: "Mutluluk, içinde olanı dışarıya yansıtmaktır.", author: "Mahatma Gandhi", category: "Yansıma", theme: 1 }
        ];

        const themesData = [
            { id: 0, name: "Altın Saat", icon: "🌸", class: "theme-golden", gradient: "linear-gradient(135deg, #ffeaa7, #fab1a0)" },
            { id: 1, name: "Bulut", icon: "☁️", class: "theme-cloud", gradient: "linear-gradient(135deg, #dfe6e9, #b2bec3)" },
            { id: 2, name: "Lavanta", icon: "✨", class: "theme-lavender", gradient: "linear-gradient(135deg, #a29bfe, #dfe6e9)" },
            { id: 3, name: "Gül", icon: "🌺", class: "theme-rose", gradient: "linear-gradient(135deg, #fd79a8, #fab1a0)" },
            { id: 4, name: "Nane", icon: "🌿", class: "theme-mint", gradient: "linear-gradient(135deg, #55efc4, #81ecec)" },
            { id: 5, name: "Okyanus", icon: "🌊", class: "theme-ocean", gradient: "linear-gradient(135deg, #74b9ff, #a29bfe)" },
            { id: 6, name: "Gün Batımı", icon: "🌅", class: "theme-sunset", gradient: "linear-gradient(135deg, #ff7675, #fdcb6e)" },
            { id: 7, name: "Gece", icon: "🌙", class: "theme-midnight", gradient: "linear-gradient(135deg, #2d3436, #636e72)" }
        ];

        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        
        let currentState = {
            themeIndex: 0,
            currentQuoteIndex: 0,
            favorites: [],
            isThemeSheetOpen: false
        };

        // ==========================================
        // INITIALIZATION
        // ==========================================
        
        document.addEventListener('DOMContentLoaded', () => {
            initializeApp();
        });

        function initializeApp() {
            loadFavorites();
            renderQuotes();
            renderThemeGrid();
            setupIntersectionObserver();
            setupKeyboardNavigation();
            setupTouchGestures();
            
            // Hide loading screen
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 500);
        }

        // ==========================================
        // RENDER FUNCTIONS
        // ==========================================
        
        function renderQuotes() {
            const container = document.getElementById('mainContainer');
            const currentTheme = themesData[currentState.themeIndex];
            
            container.innerHTML = quotesData.map((quote, index) => {
                const isLiked = currentState.favorites.includes(quote.id);
                const animations = generateAnimations();
                
                return `
                    <article class="reel-card ${currentTheme.class}" data-index="${index}" data-id="${quote.id}" aria-label="${quote.text}">
                        <div class="anim-container">
                            ${animations}
                        </div>
                        <div class="quote-container">
                            <blockquote class="quote-text">"${quote.text}"</blockquote>
                            <cite class="quote-author">— ${quote.author}</cite>
                            <span class="quote-category">${quote.category}</span>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function generateAnimations() {
            let html = '';
            for (let i = 1; i <= 20; i++) {
                html += `<div class="anim-${i}"></div>`;
            }
            return html;
        }

        function renderThemeGrid() {
            const grid = document.getElementById('themeGrid');
            grid.innerHTML = themesData.map((theme, index) => `
                <button class="theme-item ${index === currentState.themeIndex ? 'selected' : ''}" 
                        onclick="selectTheme(${index})" 
                        style="background: ${theme.gradient}"
                        aria-label="${theme.name} temasını seç"
                        aria-pressed="${index === currentState.themeIndex}">
                    <span class="theme-icon">${theme.icon}</span>
                    <span class="theme-name">${theme.name}</span>
                </button>
            `).join('');
        }

        // ==========================================
        // THEME MANAGEMENT
        // ==========================================
        
        function selectTheme(index) {
            currentState.themeIndex = index;
            
            // Update all cards with new theme
            const cards = document.querySelectorAll('.reel-card');
            const newTheme = themesData[index];
            
            cards.forEach((card, i) => {
                // Remove old theme classes
                themesData.forEach(t => card.classList.remove(t.class));
                // Add new theme class
                card.classList.add(newTheme.class);
                // Update CSS variable for symbol if needed
                card.style.setProperty('--theme-symbol', `"${newTheme.icon}"`);
            });
            
            renderThemeGrid();
            closeThemeSheet();
            showToast(`${newTheme.name} teması seçildi`);
        }

        function openThemeSheet() {
            currentState.isThemeSheetOpen = true;
            document.getElementById('themeSheet').classList.add('open');
            document.getElementById('overlay').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeThemeSheet() {
            currentState.isThemeSheetOpen = false;
            document.getElementById('themeSheet').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
            document.body.style.overflow = '';
        }

        // ==========================================
        // NAVIGATION & INTERACTION
        // ==========================================
        
        function setupIntersectionObserver() {
            const options = {
                root: null,
                rootMargin: '0px',
                threshold: 0.6
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const index = parseInt(entry.target.dataset.index);
                        currentState.currentQuoteIndex = index;
                        updateLikeButton();
                    }
                });
            }, options);

            document.querySelectorAll('.reel-card').forEach(card => {
                observer.observe(card);
            });
        }

        function setupKeyboardNavigation() {
            document.addEventListener('keydown', (e) => {
                if (currentState.isThemeSheetOpen) {
                    if (e.key === 'Escape') closeThemeSheet();
                    return;
                }
                
                const cardHeight = window.innerHeight;
                
                switch(e.key) {
                    case 'ArrowDown':
                    case ' ':
                        e.preventDefault();
                        scrollToCard(currentState.currentQuoteIndex + 1);
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        scrollToCard(currentState.currentQuoteIndex - 1);
                        break;
                    case 'Home':
                        e.preventDefault();
                        scrollToCard(0);
                        break;
                    case 'End':
                        e.preventDefault();
                        scrollToCard(quotesData.length - 1);
                        break;
                    case 'l':
                    case 'L':
                        toggleLike();
                        break;
                    case 't':
                    case 'T':
                        openThemeSheet();
                        break;
                }
            });
        }

        function setupTouchGestures() {
            let touchStartY = 0;
            let touchEndY = 0;
            const minSwipeDistance = 50;
            
            document.addEventListener('touchstart', (e) => {
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });
            
            document.addEventListener('touchend', (e) => {
                touchEndY = e.changedTouches[0].screenY;
                handleSwipe();
            }, { passive: true });
            
            function handleSwipe() {
                const swipeDistance = touchEndY - touchStartY;
                const absDistance = Math.abs(swipeDistance);
                
                if (absDistance > minSwipeDistance) {
                    if (swipeDistance < 0) {
                        // Swipe up - next
                        scrollToCard(currentState.currentQuoteIndex + 1);
                    } else {
                        // Swipe down - previous
                        scrollToCard(currentState.currentQuoteIndex - 1);
                    }
                }
            }
        }

        function scrollToCard(index) {
            if (index < 0 || index >= quotesData.length) return;
            
            const cards = document.querySelectorAll('.reel-card');
            if (cards[index]) {
                cards[index].scrollIntoView({ behavior: 'smooth' });
            }
        }

        // ==========================================
        // FAVORITES MANAGEMENT
        // ==========================================
        
        function loadFavorites() {
            const saved = localStorage.getItem('quoteFlow_favorites');
            if (saved) {
                currentState.favorites = JSON.parse(saved);
            }
        }

        function saveFavorites() {
            localStorage.setItem('quoteFlow_favorites', JSON.stringify(currentState.favorites));
        }

        function toggleLike() {
            const currentQuote = quotesData[currentState.currentQuoteIndex];
            const index = currentState.favorites.indexOf(currentQuote.id);
            
            if (index > -1) {
                currentState.favorites.splice(index, 1);
                showToast('Favorilerden çıkarıldı');
            } else {
                currentState.favorites.push(currentQuote.id);
                showToast('Favorilere eklendi! ❤️');
                createHeartAnimation();
            }
            
            saveFavorites();
            updateLikeButton();
        }

        function updateLikeButton() {
            const btn = document.getElementById('likeBtn');
            const currentQuote = quotesData[currentState.currentQuoteIndex];
            const isLiked = currentState.favorites.includes(currentQuote.id);
            
            btn.innerHTML = isLiked ? '<span>♥</span>' : '<span>♡</span>';
            btn.classList.toggle('liked', isLiked);
            btn.setAttribute('aria-pressed', isLiked);
        }

        function createHeartAnimation() {
            const btn = document.getElementById('likeBtn');
            const rect = btn.getBoundingClientRect();
            
            for (let i = 0; i < 5; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '♥';
                heart.style.cssText = `
                    position: fixed;
                    left: ${rect.left + rect.width/2}px;
                    top: ${rect.top}px;
                    font-size: 20px;
                    color: #ff006e;
                    pointer-events: none;
                    z-index: 1000;
                    transition: all 0.8s ease-out;
                `;
                document.body.appendChild(heart);
                
                setTimeout(() => {
                    heart.style.transform = `translate(${(Math.random()-0.5)*100}px, -100px) scale(0)`;
                    heart.style.opacity = '0';
                }, 10);
                
                setTimeout(() => heart.remove(), 800);
            }
        }

        // ==========================================
        // SHARING & CLIPBOARD
        // ==========================================
        
        function copyCurrent() {
            const quote = quotesData[currentState.currentQuoteIndex];
            const text = `"${quote.text}" — ${quote.author}`;
            
            navigator.clipboard.writeText(text).then(() => {
                showToast('Panoya kopyalandı');
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('Panoya kopyalandı');
            });
        }

        function shareCurrent() {
            const quote = quotesData[currentState.currentQuoteIndex];
            const shareData = {
                title: 'QuoteReels - İlham Veren Söz',
                text: `"${quote.text}" — ${quote.author}`,
                url: window.location.href
            };
            
            if (navigator.share) {
                navigator.share(shareData).catch(() => {
                    copyCurrent();
                });
            } else {
                copyCurrent();
            }
        }

        // ==========================================
        // UTILITY FUNCTIONS
        // ==========================================
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Prevent horizontal scroll
        window.addEventListener('scroll', (e) => {
            if (window.scrollX !== 0) {
                window.scrollTo(0, window.scrollY);
            }
        });

        // Handle visibility change for performance
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // Pause animations when tab is hidden
                document.body.style.setProperty('--animation-play-state', 'paused');
            } else {
                document.body.style.setProperty('--animation-play-state', 'running');
            }
        });

        // Service Worker Registration for PWA support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,').catch(() => {
                // Silent fail
            });
        }
    </script>
